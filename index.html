<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VASTET 毛孩鮮食配方師</title>
  <style>
    :root{--black:#000;--gold:#C9A961;--cream:#F5EFE0;--card:#fffaf0;--muted:#6b6253;--danger:#9f2f2f}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;background:var(--cream);color:var(--black)}header{background:#000;color:var(--cream);padding:42px 20px;border-bottom:6px solid var(--gold)}main{max-width:1160px;margin:auto;padding:22px}.hero{display:flex;justify-content:space-between;gap:18px;align-items:center}.brand{letter-spacing:.18em;color:var(--gold);font-weight:800}.panel{background:var(--card);border:1px solid rgba(0,0,0,.12);border-radius:22px;padding:20px;margin:18px 0;box-shadow:0 10px 30px rgba(0,0,0,.06)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}label{display:block;font-weight:700;margin-bottom:6px}select,input{width:100%;padding:11px;border:1px solid #cdbf9f;border-radius:12px;background:#fff;color:#000}.chips{display:flex;flex-wrap:wrap;gap:10px}.chip{border:1px solid var(--gold);background:#fff;border-radius:999px;padding:9px 13px;cursor:pointer}.chip.active{background:#000;color:var(--gold)}.chip:disabled{opacity:.42;cursor:not-allowed;text-decoration:line-through}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.btn{background:#000;color:var(--gold);border:0;border-radius:12px;padding:12px 18px;font-weight:800;cursor:pointer}.btn.secondary{background:var(--gold);color:#000}.notice{padding:13px;border-radius:14px;background:#fff3cd;border:1px solid #ead38c}.warn{color:var(--danger);font-weight:800}.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.metric{background:#fff;border-left:5px solid var(--gold);border-radius:14px;padding:14px}.bar{height:10px;background:#e8dfcd;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--gold)}table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}footer{padding:24px;color:var(--muted)}.hidden{display:none}
  </style>
</head>
<body>
  <header><div class="hero"><div><div class="brand">VASTET</div><h1 data-i18n="title">毛孩鮮食配方師</h1><p data-i18n="subtitle">以唯讀公開營養資料估算每日鮮食配方；醫療相關需求請與獸醫師討論。</p></div><button id="langBtn" class="btn secondary">EN</button></div></header>
  <main>
    <section id="offline" class="panel notice hidden">離線模式：營養資料載入失敗，已停用計算；本頁不使用任何硬編營養數值。</section>
    <section class="panel"><h2 data-i18n="profile">毛孩資料</h2><div class="grid">
      <div><label data-i18n="species">物種</label><select id="species"><option value="dog">犬</option><option value="cat">貓</option></select></div>
      <div><label data-i18n="breed">品種</label><select id="breed"></select></div>
      <div><label data-i18n="weight">體重 kg</label><input id="weight" type="number" min="0.5" step="0.1"></div>
      <div><label data-i18n="stage">生命階段</label><select id="lifeStage"><option value="adult">成犬/成貓</option><option value="growth">幼犬/幼貓</option><option value="senior">熟齡</option></select></div>
      <div><label data-i18n="neutered">結紮</label><select id="neutered"><option value="true">已結紮</option><option value="false">未結紮</option></select></div>
      <div><label data-i18n="activity">活動量</label><select id="activity"><option value="low">低</option><option value="normal" selected>一般</option><option value="high">高</option></select></div>
      <div><label data-i18n="health">健康狀況</label><select id="health"><option value="healthy">健康</option><option value="ckd">CKD 低磷</option><option value="weight_loss">減重</option><option value="chicken_allergy">雞肉過敏</option></select></div>
    </div></section>

    <section class="panel"><h2 data-i18n="ingredients">食材選擇</h2><div id="ingredientGroups"></div></section>

    <section class="panel"><h2 data-i18n="cook">烹調方式</h2><div class="toolbar"><button class="btn cook" data-mode="連湯">連湯餵食</button><button class="btn secondary cook" data-mode="棄湯">棄掉湯汁</button></div><p id="ckdTip" class="notice hidden">🩺 腎貓/腎犬照護技巧：肉類水煮後倒掉湯汁，可再降低約 30–35% 的磷與鉀。溶進湯裡的磷不會進入毛孩體內。你仍可自行改回連湯模式。</p></section>

    <section class="panel"><div class="toolbar"><button id="calc" class="btn">計算配方</button></div></section>
    <section id="out" class="panel hidden"><h2 data-i18n="result">配方結果</h2><div id="summary" class="results"></div><h3>食材克數與占比</h3><div id="formula"></div><h3>營養達標度</h3><div id="adequacy" class="results"></div><h3>補充劑建議</h3><div id="supplements" class="notice"></div><h3>餵食計畫</h3><div id="feeding"></div></section>
  </main>
  <footer id="sources"></footer>
<script>
const DATA_URLS=['/public/data/nutrition-db-v1.json','/data/nutrition-db-v1.json'];
const BREEDS={dog:[['mix','米克斯',12],['toy','小型犬',5],['medium','中型犬',15],['large','大型犬',28]],cat:[['mix','米克斯貓',4.5],['short','短毛貓',4.2],['maine','大型貓',7]]};
const TXT={zh:{title:'毛孩鮮食配方師',subtitle:'以唯讀公開營養資料估算每日鮮食配方；醫療相關需求請與獸醫師討論。',profile:'毛孩資料',species:'物種',breed:'品種',weight:'體重 kg',stage:'生命階段',neutered:'結紮',activity:'活動量',health:'健康狀況',ingredients:'食材選擇',cook:'烹調方式',result:'配方結果'},en:{title:'Fresh Food Formulator',subtitle:'Estimates daily fresh-food recipes from read-only public nutrition data. Discuss medical needs with a veterinarian.',profile:'Pet profile',species:'Species',breed:'Breed',weight:'Weight kg',stage:'Life stage',neutered:'Neutered',activity:'Activity',health:'Health',ingredients:'Ingredients',cook:'Cooking mode',result:'Formula result'}};
const state={db:null,lang:'zh',selected:new Set(),cookMode:'連湯'};
const $=id=>document.getElementById(id);
function nutrientKey(n){return ({protein:'protein_g',fat:'fat_g',ca:'ca_mg',p:'p_mg'}[n]||n+'_mg')}
function fillBreeds(){const s=$('species').value;$('breed').innerHTML=BREEDS[s].map(b=>`<option value="${b[0]}" data-w="${b[2]}">${b[1]}</option>`).join('');$('weight').value=BREEDS[s][0][2]}
function factors(){let f=1;if($('lifeStage').value==='growth')f*=1.8;if($('lifeStage').value==='senior')f*=0.95;if($('neutered').value==='true')f*=0.9;if($('activity').value==='low')f*=0.85;if($('activity').value==='high')f*=1.25;if($('health').value==='weight_loss')f*=0.8;if($('health').value==='ckd')f*=0.9;return f}
function cooked(ing,n){const cg=ing.cook_group, mode=state.cookMode;const cf=(state.db.cook_factors[cg]&&state.db.cook_factors[cg][mode])||{};const k=n==='protein_g'?'protein':n==='fat_g'?'fat':n==='ca_mg'?'ca':n==='p_mg'?'p':n.replace('_mg','');return (ing.per100g[n]||0)*(cf[k]??1)}
function renderIngredients(){const names={protein:'蛋白質',carb:'澱粉',veg:'蔬果',oil:'油脂'};$('ingredientGroups').innerHTML=['protein','carb','veg','oil'].map(g=>`<h3>${names[g]}</h3><div class="chips">${state.db.ingredients.filter(i=>i.ui_group===g).map(i=>{let disabled=$('health').value==='chicken_allergy'&&i.chicken;let warn=$('health').value==='ckd'&&i.hi_phos?' ⚠':'';return `<button class="chip ${state.selected.has(i.id)?'active':''}" data-id="${i.id}" ${disabled?'disabled':''}>${i.name_zh||i.name_en}${warn}</button>`}).join('')}</div>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{state.selected.has(b.dataset.id)?state.selected.delete(b.dataset.id):state.selected.add(b.dataset.id);renderIngredients()})}
function setCook(m){state.cookMode=m;document.querySelectorAll('.cook').forEach(b=>b.classList.toggle('secondary',b.dataset.mode!==m))}
function healthChanged(){if($('health').value==='ckd'){setCook('棄湯');$('ckdTip').classList.remove('hidden')}else $('ckdTip').classList.add('hidden');renderIngredients()}
function calculate(){if(!state.db)return;const chosen=[...state.selected].map(id=>state.db.ingredients.find(i=>i.id===id)).filter(Boolean);if(!chosen.length){alert('請至少選擇一種食材');return}const kg=Number($('weight').value);const kcal=70*Math.pow(kg,0.75)*factors();const kcal100=chosen.reduce((s,i)=>s+cooked(i,'kcal'),0)/chosen.length||1;const totalG=kcal/kcal100*100;const rows=chosen.map(i=>({ing:i,g:totalG/chosen.length}));const totals={protein_g:0,fat_g:0,ca_mg:0,p_mg:0,kcal:0};rows.forEach(r=>Object.keys(totals).forEach(n=>totals[n]+=cooked(r.ing,n)*r.g/100));const caTarget=kg*50, pTarget=kg*40, proteinTarget=kg*($('species').value==='cat'?5:3), fatTarget=kcal*0.1/9;const caGap=Math.max(0,caTarget-totals.ca_mg);$('out').classList.remove('hidden');$('summary').innerHTML=`<div class="metric"><b>每日熱量</b><h2>${kcal.toFixed(0)} kcal</h2><p>RER × 生活係數</p></div><div class="metric"><b>烹調</b><h2>${state.cookMode}</h2><p>依 cook_group 套用 JSON 係數</p></div>`;$('formula').innerHTML=`<table><tr><th>食材</th><th>克數</th><th>占比</th></tr>${rows.map(r=>`<tr><td>${r.ing.name_zh||r.ing.name_en}</td><td>${r.g.toFixed(1)} g</td><td>${(r.g/totalG*100).toFixed(1)}%</td></tr>`).join('')}</table>`;const metrics=[['蛋白',totals.protein_g,proteinTarget,'g'],['脂肪',totals.fat_g,fatTarget,'g'],['鈣',totals.ca_mg,caTarget,'mg'],['磷',totals.p_mg,pTarget,'mg'],['鈣磷比',totals.p_mg?totals.ca_mg/totals.p_mg:0,1.2,'']];$('adequacy').innerHTML=metrics.map(m=>`<div class="metric"><b>${m[0]}</b><p>${m[1].toFixed(2)} ${m[3]} / ${m[2].toFixed(2)}</p><div class="bar"><span style="width:${Math.min(100,m[1]/m[2]*100)}%"></span></div></div>`).join('');$('supplements').innerHTML=`鈣缺口約 ${caGap.toFixed(0)} mg，可換算碳酸鈣約 ${(caGap/400).toFixed(2)} g。${$('species').value==='cat'?'貓每日建議補充牛磺酸 250 mg。':''}本工具僅提供營養估算，不宣稱治療效果。`;$('feeding').innerHTML=`每日總熟重約 ${totalG.toFixed(0)} g，可分 2 餐，每餐約 ${(totalG/2).toFixed(0)} g。`;}
async function fetchJson(urls){let last;for(const url of urls){try{return await fetch(url).then(r=>{if(!r.ok)throw Error();return r.json()})}catch(e){last=e}}throw last}
function setLang(){document.documentElement.lang=state.lang==='zh'?'zh-Hant':'en';document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=TXT[state.lang][el.dataset.i18n]);$('langBtn').textContent=state.lang==='zh'?'EN':'中'}
async function init(){fillBreeds();try{state.db=await fetchJson(DATA_URLS);renderIngredients();$('sources').innerHTML=`資料來源聲明：${Object.entries(state.db.sources||{}).map(([k,v])=>`${k}: ${v}`).join('｜')}`;}catch(e){$('offline').classList.remove('hidden');$('calc').disabled=true}setLang()}
$('species').onchange=()=>{fillBreeds();};$('breed').onchange=e=>$('weight').value=e.target.selectedOptions[0].dataset.w;$('health').onchange=healthChanged;document.querySelectorAll('.cook').forEach(b=>b.onclick=()=>setCook(b.dataset.mode));$('calc').onclick=calculate;$('langBtn').onclick=()=>{state.lang=state.lang==='zh'?'en':'zh';setLang()};init();
</script>
</body>
</html>
